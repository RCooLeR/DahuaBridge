services:
  dahuabridge:
    build:
      context: .
      dockerfile: Dockerfile.baked
    container_name: dahuabridge
    restart: unless-stopped
    ports:
      - "9205:9205"
    environment:
      TZ: Europe/Kiev
    # Optional if you want Intel iGPU acceleration through QSV/VAAPI.
    # The entrypoint will detect the /dev/dri device GIDs and add the
    # dahuabridge user to those groups before dropping privileges.
    # devices:
    #   - /dev/dri:/dev/dri
