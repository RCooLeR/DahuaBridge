name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  bridge:
    name: Bridge Go Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: bridge

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: bridge/go.mod
          cache-dependency-path: bridge/go.sum

      - name: Test
        run: go test ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container
        uses: docker/build-push-action@v6
        with:
          context: ./bridge
          file: ./bridge/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: dahuabridge:ci
          build-args: |
            VERSION=ci
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.run_id }}

  integration:
    name: Home Assistant Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Test
        run: python -m unittest discover -s integration/tests

  ha-cards:
    name: HA Cards Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ha-cards

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ha-cards/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build